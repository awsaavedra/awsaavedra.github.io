baseURL = "https://awsaavedra.com/"
locale = "en"
DefaultContentLanguage = "en"
enableInlineShortcodes = true
enableEmoji = true
# pagination = 10

title = "Alexander Saavedra"
copyright = "[Home](/) &#183; Powered by [Hugo](https://gohugo.io/)"

theme = "hugo-bearblog"
enableRobotsTXT = true

[params]
  lazyImage = true
  enableMathJax = false # enable it in Front Matter
  enableReadingTime = true
  favicon = "favicon.ico"
  startyear = "2019"
  showmonth = true
  slogan = "always make it happen"
  description = "A simple and concise hugo theme."
  disableHugoGeneratorInject = true

[server]
  [[server.headers]]
    for = "/**"
    [server.headers.values]
      Strict-Transport-Security = "max-age=31536000; includeSubDomains"
      X-Content-Type-Options = "nosniff"
      X-Frame-Options = "DENY"
      Referrer-Policy = "strict-origin-when-cross-origin"
      Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), fullscreen=(self)"
      Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' https://img.youtube.com data:; font-src 'self'; frame-src https://www.youtube.com https://www.youtube-nocookie.com; form-action https://buttondown.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'"

